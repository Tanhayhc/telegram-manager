services:
  - type: worker
    name: telegram-manager-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: telegram-manager-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: telegram-manager-redis
          type: redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_JSON
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_JOINS_PER_DAY
        value: "50"
      - key: JOIN_DELAY_MIN
        value: "240"
      - key: JOIN_DELAY_MAX
        value: "480"
      - key: RETRY_FAILED_JOINS
        value: "true"
      - key: RETRY_INTERVAL_HOURS
        value: "6"
      - key: RETRY_MAX_ATTEMPTS
        value: "3"
      - key: BACKUP_DAILY_HOUR
        value: "3"
      - key: BACKUP_DIR
        value: /tmp/backups
    healthCheckPath: ~

databases:
  - name: telegram-manager-db
    plan: starter
    databaseName: tgmanager
    user: tgmanager

